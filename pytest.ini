[pytest]
addopts =
    --alluredir=reports/allure-results
    --clean-alluredir
    -v
    --tb=short
    --strict-markers

markers =
    smoke: Smoke test suite
    regression: Full regression suite
    api: API test suite
    ui: UI test suite
    github_search: GitHub search feature tests

testpaths = tests
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s | %(levelname)s | %(name)s | %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
